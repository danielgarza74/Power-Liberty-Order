<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power, Liberty, & Order</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0B162A; /* Midnight Constitution Blue */
            color: #F5F1E6; /* Aged Parchment */
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(0, 0, 0, 0.4); /* Slight darkening for depth */
            border: 1px solid #C5A009; /* Burnished Liberty Gold */
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 {
            font-family: 'Times New Roman', serif;
            color: #C5A009; /* Burnished Liberty Gold */
            text-align: center;
            border-bottom: 2px solid #1E3A5F; /* Federal Navy */
            padding-bottom: 15px;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.3rem;
            color: #F5F1E6;
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }
        .chapter-list {
            list-style: none;
            padding: 0;
        }
        .chapter-list li {
            margin-bottom: 15px;
        }
        .chapter-link {
            display: block;
            background: #1E3A5F; /* Federal Navy */
            color: #F5F1E6; /* Aged Parchment */
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 4px;
            border: 1px solid transparent;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .chapter-link:hover {
            background: rgba(197, 160, 9, 0.15); /* Liberty Gold tint */
            border-color: #C5A009; /* Liberty Gold border */
            transform: translateX(10px);
            color: #ffffff;
        }
        .coming-soon {
            text-align: center;
            color: #6C7A89; /* Union Iron */
            font-style: italic;
            margin-top: 40px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Power, Liberty, & Order</h1>
        <div class="subtitle">An Interactive Exploration of Government</div> 
        
        <ul class="chapter-list">
            <li>
                <a href=""Chapter-7/" class="chapter-link">
                    <strong>Chapter 7:</strong> The Bureacracy
                </a>
            </li>
        </ul>

        <p class="coming-soon">More chapters are currently in development. Check back later!</p>
    </div>

</body>
</html>
